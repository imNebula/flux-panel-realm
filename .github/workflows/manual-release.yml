name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 0.0.2-realm or 0.0.2-realm-dev.1
        required: true
        type: string
      channel:
        description: Release channel
        required: true
        type: choice
        options:
          - stable
          - development

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/springboot-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/vite-frontend

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      backend_tags: ${{ steps.meta.outputs.backend_tags }}
      frontend_tags: ${{ steps.meta.outputs.frontend_tags }}
      latest_flag: ${{ steps.meta.outputs.latest_flag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        run: |
          VERSION="${{ inputs.version }}"
          CHANNEL="${{ inputs.channel }}"

          if [[ -z "$VERSION" ]]; then
            echo "version is required" >&2
            exit 1
          fi

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists" >&2
            exit 1
          fi

          if [[ "$CHANNEL" == "stable" && "$VERSION" =~ (dev|beta|alpha|rc) ]]; then
            echo "Stable releases should not use prerelease-looking versions" >&2
            exit 1
          fi

          if [[ "$CHANNEL" == "development" && ! "$VERSION" =~ (dev|beta|alpha|rc) ]]; then
            echo "Development releases should include dev, beta, alpha, or rc in the version" >&2
            exit 1
          fi

          if [[ "$CHANNEL" == "stable" ]]; then
            PRERELEASE="false"
            LATEST_FLAG="--latest"
            BACKEND_TAGS="${BACKEND_IMAGE}:${VERSION}"$'\n'"${BACKEND_IMAGE}:stable"$'\n'"${BACKEND_IMAGE}:latest"
            FRONTEND_TAGS="${FRONTEND_IMAGE}:${VERSION}"$'\n'"${FRONTEND_IMAGE}:stable"$'\n'"${FRONTEND_IMAGE}:latest"
          else
            PRERELEASE="true"
            LATEST_FLAG="--latest=false"
            BACKEND_TAGS="${BACKEND_IMAGE}:${VERSION}"$'\n'"${BACKEND_IMAGE}:development"$'\n'"${BACKEND_IMAGE}:dev"
            FRONTEND_TAGS="${FRONTEND_IMAGE}:${VERSION}"$'\n'"${FRONTEND_IMAGE}:development"$'\n'"${FRONTEND_IMAGE}:dev"
          fi

          {
            echo "version=${VERSION}"
            echo "prerelease=${PRERELEASE}"
            echo "latest_flag=${LATEST_FLAG}"
            echo "backend_tags<<EOF"
            echo "$BACKEND_TAGS"
            echo "EOF"
            echo "frontend_tags<<EOF"
            echo "$FRONTEND_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-images:
    name: Build and Push Release Images
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./springboot-backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.prepare.outputs.backend_tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./vite-frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.prepare.outputs.frontend_tags }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  build-agent:
    name: Build and Compress Realm Agent Binary
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: realm-agent/go.sum

      - name: Install UPX
        run: |
          wget https://github.com/upx/upx/releases/download/v4.2.1/upx-4.2.1-amd64_linux.tar.xz
          tar -xf upx-4.2.1-amd64_linux.tar.xz
          sudo mv upx-4.2.1-amd64_linux/upx /usr/local/bin/
          rm -rf upx-4.2.1-amd64_linux*

      - name: Build agent AMD64
        working-directory: ./realm-agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.Version=${{ needs.prepare.outputs.version }}" \
            -o flux-realm-agent-amd64 .

      - name: Build agent ARM64
        working-directory: ./realm-agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X main.Version=${{ needs.prepare.outputs.version }}" \
            -o flux-realm-agent-arm64 .

      - name: Build agent ARMv7
        working-directory: ./realm-agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build \
            -ldflags="-s -w -X main.Version=${{ needs.prepare.outputs.version }}" \
            -o flux-realm-agent-armv7 .

      - name: Compress with UPX
        working-directory: ./realm-agent
        run: |
          upx --best --lzma flux-realm-agent-amd64 || true
          upx --best --lzma flux-realm-agent-arm64 || true
          upx --best --lzma flux-realm-agent-armv7 || true

      - name: Upload agent AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary-amd64
          path: ./realm-agent/flux-realm-agent-amd64

      - name: Upload agent ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary-arm64
          path: ./realm-agent/flux-realm-agent-arm64

      - name: Upload agent ARMv7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary-armv7
          path: ./realm-agent/flux-realm-agent-armv7

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-images
      - build-agent
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download agent AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-amd64
          path: ./artifacts

      - name: Download agent ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-arm64
          path: ./artifacts

      - name: Download agent ARMv7 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-armv7
          path: ./artifacts

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
          LATEST_FLAG: ${{ needs.prepare.outputs.latest_flag }}
        run: |
          git tag "$VERSION" "$GITHUB_SHA"
          git push origin "$VERSION"

          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_DATE=$(git log -1 --pretty=format:"%ai")

          RELEASE_FLAGS="$LATEST_FLAG"
          if [[ "$PRERELEASE" == "true" ]]; then
            RELEASE_FLAGS="--prerelease $RELEASE_FLAGS"
          fi

          gh release create "$VERSION" \
            --title "Release ${VERSION}" \
            $RELEASE_FLAGS \
            --notes "## Commit Information
          - Message: ${COMMIT_MSG}
          - Author: ${COMMIT_AUTHOR}
          - Date: ${COMMIT_DATE}
          - Commit: ${GITHUB_SHA:0:7}

          ## Docker Images
          - ${BACKEND_IMAGE}:${VERSION}
          - ${FRONTEND_IMAGE}:${VERSION}" \
            --repo "${{ github.repository }}"

          gh release upload "$VERSION" ./artifacts/flux-realm-agent-amd64 --clobber
          gh release upload "$VERSION" ./artifacts/flux-realm-agent-arm64 --clobber
          gh release upload "$VERSION" ./artifacts/flux-realm-agent-armv7 --clobber
          gh release upload "$VERSION" ./install.sh --clobber
          gh release upload "$VERSION" ./panel_install.sh --clobber
          gh release upload "$VERSION" ./docker-compose-v4.yml --clobber
          gh release upload "$VERSION" ./docker-compose-v6.yml --clobber
          gh release upload "$VERSION" ./realm.sql --clobber
