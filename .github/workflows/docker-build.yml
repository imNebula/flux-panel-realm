name: Build and Push Images Based on Version

# 在这里定义统一版本号
env:
  VERSION: "0.0.1-realm"

on:
  push:
    branches:
      - main
      - beta

jobs:
  check-version:
    name: Check Version and Decide Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ env.VERSION }}
      should_build: ${{ steps.check-tag.outputs.should_build }}
      should_build_agent: ${{ steps.check-tag.outputs.should_build_agent }}
      tag_exists: ${{ steps.check-tag.outputs.tag_exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Display version
        run: |
          echo "Current version: ${{ env.VERSION }}"

      - name: Check if tag exists and detect changes
        id: check-tag
        run: |
          if git rev-parse "${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag ${{ env.VERSION }} already exists"
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "should_build=false" >> $GITHUB_OUTPUT
            
            # 检查从tag到现在，realm-agent目录下的文件是否有变化
            TAG_COMMIT=$(git rev-list -n 1 "${{ env.VERSION }}")
            echo "Tag commit: $TAG_COMMIT"
            echo "Current HEAD: $(git rev-parse HEAD)"
            
            # 检查 realm-agent 目录下是否有实际的文件内容变化
            if git diff --quiet --ignore-all-space --ignore-blank-lines $TAG_COMMIT HEAD -- realm-agent/ 2>/dev/null; then
              echo "✅ realm-agent files unchanged since tag (no content changes)"
              echo "should_build_agent=false" >> $GITHUB_OUTPUT
            else
              echo "🔄 Detected changes in realm-agent directory:"
              git diff --stat $TAG_COMMIT HEAD -- realm-agent/ || true
              echo "should_build_agent=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Tag ${{ env.VERSION }} does not exist, will build all components"
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_build_agent=true" >> $GITHUB_OUTPUT
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

  build-agent:
    name: Build & Compress Realm Agent Binary
    needs: check-version
    if: needs.check-version.outputs.should_build_agent == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: realm-agent/go.sum

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-realm-agent-${{ hashFiles('realm-agent/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-realm-agent-

      - name: Install UPX
        run: |
          wget https://github.com/upx/upx/releases/download/v4.2.1/upx-4.2.1-amd64_linux.tar.xz
          tar -xf upx-4.2.1-amd64_linux.tar.xz
          sudo mv upx-4.2.1-amd64_linux/upx /usr/local/bin/
          rm -rf upx-4.2.1-amd64_linux*

      - name: Build agent (AMD64)
        working-directory: ./realm-agent
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o flux-realm-agent-amd64 .

      - name: Build agent (ARM64)
        working-directory: ./realm-agent
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o flux-realm-agent-arm64 .

      - name: Build agent (ARMv7)
        working-directory: ./realm-agent
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o flux-realm-agent-armv7 .

      - name: Compress with UPX
        working-directory: ./realm-agent
        run: |
          upx --best --lzma flux-realm-agent-amd64 || true
          upx --best --lzma flux-realm-agent-arm64 || true
          upx --best --lzma flux-realm-agent-armv7 || true

      - name: Upload agent AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary-amd64
          path: ./realm-agent/flux-realm-agent-amd64

      - name: Upload agent ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary-arm64
          path: ./realm-agent/flux-realm-agent-arm64

      - name: Upload agent ARMv7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary-armv7
          path: ./realm-agent/flux-realm-agent-armv7

  build-vite:
    name: Build & Push Vite Frontend
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      docker_pushed: ${{ steps.dockerhub.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vite-frontend/package-lock.json

      - name: Check DockerHub credentials
        id: dockerhub
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: |
          if [ -n "$DOCKER_HUB_USERNAME" ] && [ -n "$DOCKER_HUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DockerHub credentials are not configured; building frontend image without pushing. Release creation will be skipped."
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Vite Docker images
        if: steps.dockerhub.outputs.enabled == 'true'
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t bqlpfy/vite-frontend:latest \
            -t bqlpfy/vite-frontend:${VERSION} \
            ./vite-frontend

      - name: Build Vite Docker images
        if: steps.dockerhub.outputs.enabled != 'true'
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            ./vite-frontend

  build-java:
    name: Build & Push Spring Boot Backend
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      docker_pushed: ${{ steps.dockerhub.outputs.enabled }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK and Maven
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build Java JAR
        working-directory: ./springboot-backend
        run: mvn clean package -DskipTests

      - name: Check DockerHub credentials
        id: dockerhub
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: |
          if [ -n "$DOCKER_HUB_USERNAME" ] && [ -n "$DOCKER_HUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::DockerHub credentials are not configured; building backend image without pushing. Release creation will be skipped."
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Java Docker images
        if: steps.dockerhub.outputs.enabled == 'true'
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t bqlpfy/springboot-backend:latest \
            -t bqlpfy/springboot-backend:${VERSION} \
            ./springboot-backend

      - name: Build Java Docker images
        if: steps.dockerhub.outputs.enabled != 'true'
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            ./springboot-backend

  create-release:
    name: Create Release and Tag
    needs: [check-version, build-agent, build-vite, build-java]
    if: needs.check-version.outputs.should_build == 'true' && needs.build-vite.outputs.docker_pushed == 'true' && needs.build-java.outputs.docker_pushed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download agent AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-amd64
          path: ./artifacts

      - name: Download agent ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-arm64
          path: ./artifacts

      - name: Download agent ARMv7 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-armv7
          path: ./artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          
          # 创建并推送 tag
          git tag "${VERSION}" ${{ github.sha }}
          git push origin "${VERSION}"
          
          # 获取 commit 信息
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_DATE=$(git log -1 --pretty=format:"%ai")
          
          # 创建 release
          gh release create "${VERSION}" \
            --title "Release ${VERSION}" \
            --notes "## 📝 Commit Information
          - **Message**: ${COMMIT_MSG}
          - **Author**: ${COMMIT_AUTHOR}
          - **Date**: ${COMMIT_DATE}
          - **Commit**: [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" \
            --repo ${{ github.repository }}
          
          # 上传 Agent 二进制文件
          echo "📤 上传 Realm Agent 二进制文件..."
          gh release upload "${VERSION}" ./artifacts/flux-realm-agent-amd64 --clobber
          gh release upload "${VERSION}" ./artifacts/flux-realm-agent-arm64 --clobber
          gh release upload "${VERSION}" ./artifacts/flux-realm-agent-armv7 --clobber
          
          echo "📤 上传安装脚本..."
          gh release upload "${VERSION}" ./install.sh --clobber
          gh release upload "${VERSION}" ./panel_install.sh --clobber
          
          echo "📤 上传 Docker Compose 配置文件..."
          gh release upload "${VERSION}" ./docker-compose-v4.yml --clobber
          gh release upload "${VERSION}" ./docker-compose-v6.yml --clobber
          
          echo "✅ 所有文件已上传到 Release ${VERSION}"

  update-release-agent:
    name: Update Agent Binaries in Release
    needs: [check-version, build-agent]
    if: needs.check-version.outputs.should_build == 'false' && needs.check-version.outputs.should_build_agent == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download agent AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-amd64
          path: ./artifacts

      - name: Download agent ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-arm64
          path: ./artifacts

      - name: Download agent ARMv7 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-armv7
          path: ./artifacts

      - name: Update agent binaries in Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          
          echo "🔄 更新 Release ${VERSION} 中的 Realm Agent 二进制文件..."
          
          gh release upload "${VERSION}" ./artifacts/flux-realm-agent-amd64 --clobber
          gh release upload "${VERSION}" ./artifacts/flux-realm-agent-arm64 --clobber
          gh release upload "${VERSION}" ./artifacts/flux-realm-agent-armv7 --clobber
          
          echo "✅ Realm Agent 二进制文件更新完成！"
          echo "ℹ️ Docker 镜像未重新构建"

  update-release-files:
    name: Update Release Files Only
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'true' && needs.check-version.outputs.should_build == 'false' && needs.check-version.outputs.should_build_agent == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update Release Files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          
          echo "📤 更新 Release ${VERSION} 中的脚本和配置文件..."
          
          # 上传安装脚本（覆盖）
          echo "📤 更新安装脚本..."
          gh release upload "${VERSION}" ./install.sh --clobber
          gh release upload "${VERSION}" ./panel_install.sh --clobber
          
          # 上传 Docker Compose 配置文件（覆盖）
          echo "📤 更新 Docker Compose 配置文件..."
          gh release upload "${VERSION}" ./docker-compose-v4.yml --clobber
          gh release upload "${VERSION}" ./docker-compose-v6.yml --clobber
          
          echo "✅ 文件更新完成！Release ${VERSION} 中的脚本和配置已更新"
          echo "ℹ️ Docker 镜像和 Agent 二进制未重新构建"
