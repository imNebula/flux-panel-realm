name: Auto Development Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: auto-development-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

env:
  VERSION: "0.0.1-realm"
  REGISTRY: ghcr.io
  IMAGE_PLATFORMS: linux/amd64

jobs:
  prepare:
    name: Resolve Development Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      base_version: ${{ steps.meta.outputs.base_version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      latest_flag: ${{ steps.meta.outputs.latest_flag }}
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      backend_tags: ${{ steps.meta.outputs.backend_tags }}
      frontend_tags: ${{ steps.meta.outputs.frontend_tags }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        run: |
          BASE_VERSION="${VERSION}"
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_REPO="${GITHUB_REPOSITORY,,}"
          BACKEND_IMAGE="${REGISTRY}/${IMAGE_REPO}/springboot-backend"
          FRONTEND_IMAGE="${REGISTRY}/${IMAGE_REPO}/vite-frontend"

          if [[ -z "$BASE_VERSION" ]]; then
            echo "VERSION is required" >&2
            exit 1
          fi

          git fetch --tags --force

          RELEASE_VERSION="${BASE_VERSION}-dev.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          PRERELEASE="true"
          LATEST_FLAG="--latest=false"
          BACKEND_TAGS="${BACKEND_IMAGE}:${RELEASE_VERSION}"$'\n'"${BACKEND_IMAGE}:development"$'\n'"${BACKEND_IMAGE}:dev"$'\n'"${BACKEND_IMAGE}:sha-${SHORT_SHA}"
          FRONTEND_TAGS="${FRONTEND_IMAGE}:${RELEASE_VERSION}"$'\n'"${FRONTEND_IMAGE}:development"$'\n'"${FRONTEND_IMAGE}:dev"$'\n'"${FRONTEND_IMAGE}:sha-${SHORT_SHA}"

          {
            echo "version=${RELEASE_VERSION}"
            echo "base_version=${BASE_VERSION}"
            echo "prerelease=${PRERELEASE}"
            echo "latest_flag=${LATEST_FLAG}"
            echo "backend_image=${BACKEND_IMAGE}"
            echo "frontend_image=${FRONTEND_IMAGE}"
            echo "backend_tags<<EOF"
            echo "$BACKEND_TAGS"
            echo "EOF"
            echo "frontend_tags<<EOF"
            echo "$FRONTEND_TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved development release: ${RELEASE_VERSION}"

  build-backend-image:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./springboot-backend
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: ${{ needs.prepare.outputs.backend_tags }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend-image:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./vite-frontend
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: ${{ needs.prepare.outputs.frontend_tags }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  build-agent:
    name: Build and Compress Realm Agent
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: realm-agent/go.sum

      - name: Install UPX
        run: |
          wget https://github.com/upx/upx/releases/download/v4.2.1/upx-4.2.1-amd64_linux.tar.xz
          tar -xf upx-4.2.1-amd64_linux.tar.xz
          sudo mv upx-4.2.1-amd64_linux/upx /usr/local/bin/
          rm -rf upx-4.2.1-amd64_linux*

      - name: Build agent AMD64
        working-directory: ./realm-agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.Version=${{ needs.prepare.outputs.version }}" \
            -o flux-realm-agent-amd64 .

      - name: Build agent ARM64
        working-directory: ./realm-agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w -X main.Version=${{ needs.prepare.outputs.version }}" \
            -o flux-realm-agent-arm64 .

      - name: Build agent ARMv7
        working-directory: ./realm-agent
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build \
            -ldflags="-s -w -X main.Version=${{ needs.prepare.outputs.version }}" \
            -o flux-realm-agent-armv7 .

      - name: Compress with UPX
        working-directory: ./realm-agent
        run: |
          upx --best --lzma flux-realm-agent-amd64 || true
          upx --best --lzma flux-realm-agent-arm64 || true
          upx --best --lzma flux-realm-agent-armv7 || true

      - name: Upload agent AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary-amd64
          path: ./realm-agent/flux-realm-agent-amd64

      - name: Upload agent ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary-arm64
          path: ./realm-agent/flux-realm-agent-arm64

      - name: Upload agent ARMv7 artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary-armv7
          path: ./realm-agent/flux-realm-agent-armv7

  create-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-backend-image
      - build-frontend-image
      - build-agent
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download agent AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-amd64
          path: ./artifacts

      - name: Download agent ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-arm64
          path: ./artifacts

      - name: Download agent ARMv7 binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-armv7
          path: ./artifacts

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          BASE_VERSION: ${{ needs.prepare.outputs.base_version }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
          LATEST_FLAG: ${{ needs.prepare.outputs.latest_flag }}
          BACKEND_IMAGE: ${{ needs.prepare.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.prepare.outputs.frontend_image }}
        run: |
          git tag "$RELEASE_VERSION" "$GITHUB_SHA"
          git push origin "$RELEASE_VERSION"

          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_DATE=$(git log -1 --pretty=format:"%ai")

          RELEASE_FLAGS="$LATEST_FLAG"
          if [[ "$PRERELEASE" == "true" ]]; then
            RELEASE_FLAGS="--prerelease $RELEASE_FLAGS"
          fi

          gh release create "$RELEASE_VERSION" \
            --title "Release ${RELEASE_VERSION}" \
            $RELEASE_FLAGS \
            --notes "## Release Channel
          - Channel: development
          - Base Version: ${BASE_VERSION}

          ## Commit Information
          - Message: ${COMMIT_MSG}
          - Author: ${COMMIT_AUTHOR}
          - Date: ${COMMIT_DATE}
          - Commit: ${GITHUB_SHA:0:7}

          ## Docker Images
          - ${BACKEND_IMAGE}:${RELEASE_VERSION}
          - ${FRONTEND_IMAGE}:${RELEASE_VERSION}" \
            --repo "${{ github.repository }}"

          gh release upload "$RELEASE_VERSION" ./artifacts/flux-realm-agent-amd64 --clobber
          gh release upload "$RELEASE_VERSION" ./artifacts/flux-realm-agent-arm64 --clobber
          gh release upload "$RELEASE_VERSION" ./artifacts/flux-realm-agent-armv7 --clobber
          gh release upload "$RELEASE_VERSION" ./install.sh --clobber
          gh release upload "$RELEASE_VERSION" ./panel_install.sh --clobber
          gh release upload "$RELEASE_VERSION" ./panel_uninstall.sh --clobber
          gh release upload "$RELEASE_VERSION" ./docker-compose-v4.yml --clobber
          gh release upload "$RELEASE_VERSION" ./docker-compose-v6.yml --clobber
          gh release upload "$RELEASE_VERSION" ./realm.sql --clobber
